name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Spell check with codespell
        run: uv run codespell

      - name: Type check with mypy
        run: uv run mypy src/

      - name: Security scan with bandit
        run: uv run bandit -c pyproject.toml -r src/

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency vulnerability scan
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2026-3219

  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: [lint-and-security]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    env:
      PYTHONUTF8: 1

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Run tests with coverage
        shell: bash
        run: |
          export COVERAGE_FILE=.coverage.${{ matrix.os }}-${{ matrix.python-version }}
          uv run pytest \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml \
            --cov-report=term \
            --junit-xml=test-results-${{ matrix.os }}-${{ matrix.python-version }}.xml

          ls -la .coverage*

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: test-results-*.xml

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ matrix.os }}-${{ matrix.python-version }}
          include-hidden-files: true
          path: |
            coverage-*.xml
            .coverage.*

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Download all coverage data
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          path: coverage-reports
          merge-multiple: true

      - name: Combine coverage
        run: |
          # Move all .coverage.* files to root
          find coverage-reports -type f -name ".coverage.*" -exec mv -v {} . \;
          ls -la .coverage*

          # Combine binary data
          uv run coverage combine

          # Generate final reports
          uv run coverage xml -o coverage.xml
          uv run coverage html -d htmlcov
          uv run coverage report

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: combined-html-coverage-report
          path: htmlcov/
