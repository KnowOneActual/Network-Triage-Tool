name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: python -m uv pip install -e ".[dev]"

      - name: Lint with ruff
        run: python -m uv run ruff check .

      - name: Check formatting with ruff
        run: python -m uv run ruff format --check .

      - name: Spell check with codespell
        run: python -m uv run codespell

      - name: Type check with mypy
        run: python -m uv run mypy src/ # Assuming mypy is installed as a dev dependency

      - name: Security scan with bandit
        run: python -m uv run bandit -c pyproject.toml -r src/

      - name: Secret scan with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB.TOKEN }}

      - name: Dependency vulnerability scan
        run: python -m uv run pip-audit

  test:
    name: Test on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: [lint-and-security] # Ensure linting/security passes before running tests

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.12'
          - '3.13'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: python -m uv pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m uv run pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --junit-xml=test-results-${{ matrix.os }}-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: test-results-*.xml

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.os }}-${{ matrix.python-version }}
          path: ./*.xml # Upload coverage.xml for combining later

  code-coverage-report:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    needs: [test] # Depends on all test jobs completing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Use a consistent Python version for coverage reporting

      - name: Set up uv
        uses: astral-sh/setup-uv@v1

      - name: Install dependencies
        run: python -m uv pip install -e ".[dev]"

      - name: Download all coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: coverage-artifacts

      - name: Combine coverage reports
        run: |
          # Install coverage tool if not already in dev deps
          python -m uv pip install coverage
          # Merge xml coverage reports
          python -m uv run coverage combine --keep --data-file=coverage-artifacts/.coverage.*
          python -m uv run coverage xml -o coverage.xml
          python -m uv run coverage html -d htmlcov

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: combined
          name: combined-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: combined-html-coverage-report
          path: htmlcov/
